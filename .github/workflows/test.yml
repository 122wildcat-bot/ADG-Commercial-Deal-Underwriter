name: test

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # The golden-master test is the ship-blocker (spec §5.5).
      # If this drifts, the engine has silently started lying.
      - run: npm test
      - run: npm run check
